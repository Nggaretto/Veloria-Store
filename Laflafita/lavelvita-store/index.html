<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaVelvita | لافلفيتا ستور 🎀</title>
    <style>
        :root {
            --soft-pink: #ffdae9;
            --deep-pink: #f48fb1;
            --white: #ffffff;
            --light-bg: #fffafc;
            --text-gray: #555;
            --shadow: 0 10px 25px rgba(244, 143, 177, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--light-bg);
            color: var(--text-gray);
        }

        header {
            background-color: var(--white);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { color: var(--deep-pink); margin: 0; cursor: pointer; }

        .cart-btn {
            background: var(--soft-pink);
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #880e4f;
            border: none;
        }

        .categories-nav { text-align: center; padding: 30px 0; }
        .categories-nav button {
            background: var(--white);
            border: 2px solid var(--soft-pink);
            padding: 10px 25px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }

        .categories-nav button.active {
            background: var(--deep-pink);
            color: white;
            border-color: var(--deep-pink);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        #product-display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: var(--white);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 218, 233, 0.3);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
        }

        .price {
            font-size: 1.3rem;
            color: var(--deep-pink);
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: var(--soft-pink);
            border: none;
            border-radius: 15px;
            color: #880e4f;
            font-weight: bold;
            cursor: pointer;
        }

        .add-btn:hover { background: var(--deep-pink); color: white; }

        #cart-section {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 30px;
            margin-top: 30px;
            box-shadow: var(--shadow);
            border: 2px solid var(--soft-pink);
        }

        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; border: 1px solid var(--soft-pink); border-radius: 12px;
        }

        .no-data { text-align: center; padding: 40px; color: var(--deep-pink); font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">LaVelvita 🎀</h1>
        <button class="cart-btn" onclick="toggleCart()">🛒 السلة (<span id="cart-count">0</span>)</button>
    </header>

    <div class="container">
        <nav class="categories-nav">
            <button class="active" onclick="renderProducts('الكل', this)">الكل</button>
            <button onclick="renderProducts('بادي اسبلاش', this)">بادي اسبلاش</button>
            <button onclick="renderProducts('ملمع شفاه', this)">ملمع شفاه</button>
            <button onclick="renderProducts('صابون', this)">صابون</button>
            <button onclick="renderProducts('لوشن', this)">لوشن</button>
        </nav>

        <div id="product-display">
            <p style="text-align:center;">جاري تحميل الجمال... ✨</p>
        </div>

        <section id="cart-section">
            <h2 style="text-align: center; color: var(--deep-pink);">بيانات الشحن 🛍️</h2>
            <div id="cart-items-preview" style="margin-bottom: 15px; text-align: center; color: #888;"></div>
            <div class="form-group"><input type="text" id="cust-name" placeholder="الاسم بالكامل"></div>
            <div class="form-group">
                <select id="cust-city">
                    <option>القاهرة</option>
                    <option>الإسكندرية</option>
                    <option>طنطا</option>
                    <option>المنصورة</option>
                    <option>الجيزة</option>
                </select>
            </div>
            <div class="form-group"><input type="text" id="cust-address" placeholder="العنوان بالتفصيل"></div>
            <button class="add-btn" style="background: var(--deep-pink); color: white;" onclick="submitOrder()">تأكيد الأوردر ✨</button>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // إعدادات Firebase المعدلة لتناسب سيرفر آسيا الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyAoqR1UqFt0MT7dxFtjNCkZB3W-6NVaf7A",
            authDomain: "laflafeta.firebaseapp.com",
            databaseURL: "https://laflafeta-default-rtdb.asia-southeast1.firebasedatabase.app", 
            projectId: "laflafeta",
            storageBucket: "laflafeta.firebasestorage.app",
            messagingSenderId: "878138717919",
            appId: "1:878138717919:web:74c9c0e694888eb1465b6a"
        };

        // بدء تشغيل Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        let cart = [];
        let fetchedProducts = [];

        // دالة عرض المنتجات من السيرفر
        function renderProducts(category = 'الكل', btn = null) {
            const display = document.getElementById('product-display');
            
            if(btn) {
                document.querySelectorAll('.categories-nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            // الاستماع للبيانات من فرع products
            db.ref('products').on('value', (snapshot) => {
                display.innerHTML = '';
                const data = snapshot.val();
                fetchedProducts = [];

                if(!data) {
                    display.innerHTML = '<p class="no-data">لا توجد منتجات حالياً في المتجر 🌸</p>';
                    return;
                }

                Object.keys(data).forEach(id => {
                    const p = data[id];
                    p.id = id; 
                    fetchedProducts.push(p);

                    if(category === 'الكل' || p.category === category) {
                        display.innerHTML += `
                            <div class="product-card">
                                <img src="${p.img || 'https://via.placeholder.com/200'}" alt="${p.name}">
                                <h3>${p.name}</h3>
                                <p>${p.desc || ''}</p>
                                <span class="price">${p.price} ج.م</span>
                                <button class="add-btn" onclick="addToCart('${id}')">أضف للسلة 🛒</button>
                            </div>
                        `;
                    }
                });

                if(display.innerHTML === '') {
                    display.innerHTML = '<p class="no-data">لا توجد منتجات في هذا القسم حالياً 🌸</p>';
                }
            }, (error) => {
                console.error("خطأ في جلب البيانات:", error);
                display.innerHTML = '<p class="no-data">حدث خطأ في الاتصال بالسيرفر ❌</p>';
            });
        }

        // إضافة للسلة
        function addToCart(id) {
            const item = fetchedProducts.find(p => p.id === id);
            if(item) {
                cart.push(item);
                document.getElementById('cart-count').innerText = cart.length;
                alert(`تم إضافة ${item.name} للسلة 🎀`);
            }
        }

        // فتح وإغلاق السلة
        function toggleCart() {
            const sec = document.getElementById('cart-section');
            sec.style.display = sec.style.display === 'block' ? 'none' : 'block';
            if(sec.style.display === 'block') {
                sec.scrollIntoView({behavior: 'smooth'});
                const preview = document.getElementById('cart-items-preview');
                preview.innerText = cart.length > 0 ? "منتجاتك: " + cart.map(i => i.name).join(' - ') : "السلة فارغة حالياً";
            }
        }

        // إرسال الطلب
        function submitOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const city = document.getElementById('cust-city').value;

            if(!name || !address) return alert("من فضلك ادخلي اسمك وعنوانك بالكامل 🌸");
            if(cart.length === 0) return alert("السلة فارغة، ضيفي منتجات الأول يا قمر ✨");

            const orderData = {
                customer: { name, address, city },
                items: cart,
                total: cart.reduce((s, i) => s + parseFloat(i.price), 0),
                date: new Date().toLocaleString('ar-EG'),
                status: "جديد ✨"
            };

            db.ref('orders').push(orderData).then(() => {
                alert(`شكراً يا ${name}! أوردرك وصل لافلفيتا بنجاح 🎀`);
                cart = [];
                document.getElementById('cart-count').innerText = "0";
                document.getElementById('cust-name').value = "";
                document.getElementById('cust-address').value = "";
                toggleCart();
                // لضمان التحديث التام
                location.reload(); 
            }).catch(err => {
                alert("عذراً، حدثت مشكلة أثناء إرسال الطلب ❌");
                console.error(err);
            });
        }

        // تشغيل العرض عند التحميل
        window.onload = () => renderProducts('الكل');
    </script>
</body>
</html>
